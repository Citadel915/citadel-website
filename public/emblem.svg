  />

  <!-- Castle battlements (3 merlons) -->
  <rect x="40" y="25" width="5.5" height="7" fill="#C9A96E" rx="0.5" />
  <rect x="47.25" y="25" width="5.5" height="7" fill="#C9A96E" rx="0.5" />
  <rect x="54.5" y="25" width="5.5" height="7" fill="#C9A96E" rx="0.5" />

  <!-- Gate arch -->
  <path
    d="M44 74 L44 62 Q50 56 56 62 L56 74"
    stroke="#C9A96E"
